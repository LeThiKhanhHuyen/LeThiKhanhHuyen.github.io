<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Tài Liệu Học Tập</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding-top: 100px;
        }

        .container{
            background: white;
            width: 80%;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color: #333;
        }

        p{
            color: #666;
        }

        .btn{
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }

        .btn:hover{
            background-color: #3367D6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kho Tài Liệu Học Tập</h1>

        <p>
            Nhấn nút bên dưới để truy cập thư mục Google Drive.
        </p>

        <a class="btn"
           href="https://drive.google.com/drive/u/0/folders/1JZidUs8SlAXs_eSMiaLdyR_xm2L7P5tH"
           target="_blank">
            📁 Mở Google Drive
        </a>
    </div>

</body>
</html>
